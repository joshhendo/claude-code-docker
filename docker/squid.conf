# ── Squid whitelist proxy for Claude Code ─────────────────────────────────────
#
# Allows HTTPS CONNECT tunnels and plain HTTP only to the domains listed below.
# All other traffic is denied. Squid does NOT decrypt HTTPS — it just decides
# whether to allow or block the tunnel based on the destination hostname.
# ─────────────────────────────────────────────────────────────────────────────

http_port 3128

# ── Allowed destinations ──────────────────────────────────────────────────────

# Anthropic API and auth
acl allowed_sites dstdomain .anthropic.com
acl allowed_sites dstdomain .claude.com
acl allowed_sites dstdomain claude.ai

# Test domain
acl allowed_sites dstdomain example.com

# ── Access rules ──────────────────────────────────────────────────────────────

# Allow CONNECT (used for all HTTPS traffic) to allowed sites only
http_access allow CONNECT allowed_sites

# Allow plain HTTP to allowed sites
http_access allow allowed_sites

# Deny everything else
http_access deny all

cache deny all

